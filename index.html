<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expresso JL Transportes — Sistema de Coletas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E8161A;
    --red-dark: #B81014;
    --red-light: #2a0000;
    --black: #000000;
    --gray-900: #ffffff;
    --gray-700: #e0e0e0;
    --gray-500: #999999;
    --gray-300: #666666;
    --gray-100: #1a1a1a;
    --white: #141414;
    --border: #2e2e2e;
    --radius: 6px;
    --radius-lg: 10px;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #000000;
    color: #e0e0e0;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: #000000;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--red);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-box {
    background: #000;
    padding: 4px 12px 4px 8px;
    clip-path: polygon(0 0, 95% 0, 100% 100%, 5% 100%);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .logo-expresso {
    font-size: 13px;
    font-weight: 900;
    font-style: italic;
    letter-spacing: 1px;
    color: var(--red);
  }

  .logo-jl {
    font-size: 22px;
    font-weight: 900;
    font-style: italic;
    color: #ffffff;
  }

  .logo-sub {
    font-size: 11px;
    color: #666666;
    letter-spacing: 0.5px;
    font-style: italic;
  }

  .empresa-info {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .empresa-info span {
    color: #666666;
    font-size: 11px;
  }

  .empresa-info .cnpj {
    color: var(--red);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* NAV */
  nav {
    background: #0a0a0a;
    display: flex;
    gap: 0;
    padding: 0 2rem;
    border-bottom: 1px solid #222222;
  }

  nav button {
    padding: 12px 20px;
    border: none;
    background: none;
    color: #888888;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all .15s;
    letter-spacing: 0.3px;
  }

  nav button:hover { color: #ffffff; background: rgba(255,255,255,.04); }
  nav button.active { color: var(--red); border-bottom-color: var(--red); }

  /* MAIN */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* PAGE */
  .page { display: none; }
  .page.active { display: block; }

  /* DASHBOARD */
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 2rem;
  }

  .metric {
    background: #141414;
    border-radius: var(--radius-lg);
    padding: 1.2rem 1.4rem;
    border: 1px solid #2e2e2e;
    border-left: 4px solid var(--red);
  }

  .metric .m-label {
    font-size: 11px;
    font-weight: 600;
    color: #666666;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .metric .m-value {
    font-size: 32px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1;
  }

  .metric.pendente { border-left-color: #F59E0B; }
  .metric.em-rota  { border-left-color: #3B82F6; }
  .metric.coletado { border-left-color: #22C55E; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: #888888;
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid #333333;
    background: #1c1c1c;
    color: #cccccc;
    transition: all .15s;
    letter-spacing: .02em;
  }

  .btn:hover { background: #252525; border-color: #444444; }
  .btn:active { transform: scale(.98); }

  .btn.primary {
    background: var(--red);
    color: #ffffff;
    border-color: var(--red);
  }

  .btn.primary:hover { background: var(--red-dark); border-color: var(--red-dark); }

  .btn.sm { padding: 6px 12px; font-size: 12px; }

  /* CARDS */
  .card {
    background: #141414;
    border: 1px solid #2e2e2e;
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  /* ORDER CARDS */
  .order-card {
    background: #141414;
    border: 1px solid #2e2e2e;
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 10px;
    transition: border-color .15s;
  }

  .order-card:hover { border-color: #444444; }

  .order-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 10px;
  }

  .order-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--red);
    letter-spacing: .04em;
  }

  .order-date {
    font-size: 12px;
    color: #666666;
    margin-left: 8px;
  }

  .order-empresa {
    font-size: 15px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 8px;
  }

  .order-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 20px;
    font-size: 13px;
    color: #666666;
    margin-bottom: 12px;
  }

  .order-grid span {
    display: flex;
    align-items: flex-start;
    gap: 5px;
  }

  .order-grid span b { color: #cccccc; font-weight: 500; }

  .order-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid #2e2e2e;
  }

  .status-sel {
    font-size: 12px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: var(--radius);
    border: 1.5px solid #333333;
    background: #1c1c1c;
    cursor: pointer;
    color: #cccccc;
  }

  /* BADGES */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: .03em;
    text-transform: uppercase;
  }

  .badge.pendente  { background: #2d2000; color: #F59E0B; border: 1px solid #3d2e00; }
  .badge.em-rota   { background: #001836; color: #60a5fa; border: 1px solid #002050; }
  .badge.coletado  { background: #001f0d; color: #4ade80; border: 1px solid #003018; }
  .badge.cancelado { background: #200000; color: #f87171; border: 1px solid #350000; }

  /* FORM */
  .form-section {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
  }

  .form-section h3 {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--red);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid #2a0000;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .form-group.full { grid-column: 1 / -1; }

  .form-group label {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-500);
    letter-spacing: .03em;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    background: var(--white);
    color: var(--gray-900);
    transition: border-color .15s;
    font-family: inherit;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--red);
  }

  .form-group textarea { resize: vertical; min-height: 72px; }

  .form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding-top: 4px;
  }

  .error-msg {
    display: none;
    background: #2a0000;
    color: #f87171;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: var(--radius);
    margin-bottom: 12px;
    font-weight: 500;
    border: 1px solid #500000;
  }

  /* FILTER */
  .filter-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    align-items: center;
  }

  .filter-bar input,
  .filter-bar select {
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    background: var(--white);
    color: var(--gray-900);
  }

  .filter-bar input { flex: 1; min-width: 200px; }
  .filter-bar select { min-width: 160px; }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 3.5rem 1rem;
    color: var(--gray-500);
  }

  .empty .empty-icon {
    font-size: 48px;
    margin-bottom: 10px;
    opacity: .35;
  }

  .empty p { font-size: 14px; }

  /* DOCUMENTO */
  .doc-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .doc-header-bar {
    background: var(--black);
    color: var(--white);
    padding: .6rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .doc-header-bar span { font-size: 12px; color: var(--gray-300); }
  .doc-header-bar strong { font-size: 13px; color: var(--red); letter-spacing: .04em; }

  .doc-body { padding: 1.5rem; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #141414;
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
    margin: 1rem;
  }

  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid #2e2e2e;
    background: #000000;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }

  .modal-head h2 { font-size: 15px; font-weight: 700; color: var(--white); }
  .modal-head button { background: none; border: none; color: #888888; font-size: 22px; cursor: pointer; line-height: 1; }
  .modal-head button:hover { color: #ffffff; }

  .modal-body { padding: 1.5rem; background: #141414; }

  /* DOCUMENTO IMPRESSÃO */
  .doc-print {
    font-family: Arial, sans-serif;
    font-size: 13px;
  }

  .doc-print table {
    width: 100%;
    border-collapse: collapse;
  }

  .doc-print td, .doc-print th {
    border: 1px solid #999;
    padding: 5px 8px;
    font-size: 12px;
  }

  .doc-print .header-block {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0;
    border: 1px solid #999;
    margin-bottom: 0;
  }

  .doc-print .logo-cell {
    padding: 10px 14px;
    border-right: 1px solid #999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .doc-print .logo-cell .exp-tag {
    background: var(--red);
    color: var(--white);
    font-weight: 900;
    font-size: 13px;
    padding: 2px 6px;
    letter-spacing: 1px;
    font-style: italic;
    clip-path: polygon(2% 0, 100% 0, 98% 100%, 0% 100%);
  }

  .doc-print .logo-cell .jl-big {
    font-size: 26px;
    font-weight: 900;
    font-style: italic;
    color: var(--black);
    line-height: 1;
  }

  .doc-print .logo-cell small {
    font-size: 9px;
    color: var(--gray-500);
    letter-spacing: 1px;
  }

  .doc-print .info-cell {
    padding: 8px 12px;
    text-align: center;
    border-right: 1px solid #999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }

  .doc-print .info-cell p { font-size: 11px; line-height: 1.4; }
  .doc-print .info-cell .cnpj-line {
    font-weight: 700;
    background: transparent;
    color: inherit;
    padding: 2px 6px;
    display: inline-block;
    margin-top: 3px;
    font-size: 11px;
  }

  .doc-print .num-cell {
    padding: 8px 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }

  .doc-print .num-cell p { font-size: 12px; font-weight: 700; }
  .doc-print .num-cell small { font-size: 11px; color: var(--gray-500); }

  .doc-print .section-row {
    display: flex;
  }

  .doc-print .section-label {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 8px 4px;
    border: 1px solid #999;
    border-top: none;
    background: var(--gray-100);
    text-align: center;
    text-transform: uppercase;
  }

  .doc-print .section-fields {
    flex: 1;
    border: 1px solid #999;
    border-top: none;
    border-left: none;
  }

  .doc-print .field-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    border-bottom: 1px solid #ddd;
  }

  .doc-print .field-row:last-child { border-bottom: none; }

  .doc-print .field-key {
    padding: 5px 8px;
    font-weight: 700;
    font-size: 11px;
    background: var(--gray-100);
    border-right: 1px solid #ddd;
    color: var(--gray-700);
  }

  .doc-print .field-val {
    padding: 5px 10px;
    font-size: 12px;
  }

  .doc-print .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1fr 2fr;
    border: 1px solid #999;
    border-top: none;
  }

  .doc-print .bottom-cell {
    padding: 8px 10px;
    border-right: 1px solid #999;
  }

  .doc-print .bottom-cell:last-child { border-right: none; }
  .doc-print .bottom-cell .cell-label { font-size: 10px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
  .doc-print .bottom-cell .cell-val { font-size: 12px; font-weight: 600; }
  .doc-print .bottom-cell .cell-val.pedidos { font-size: 11px; background: transparent; color: inherit; padding: 4px 6px; border-radius: 3px; word-break: break-word; }

  .doc-print .obs-row {
    border: 1px solid #999;
    border-top: none;
    padding: 8px 10px;
  }

  .doc-print .obs-row .cell-label { font-size: 10px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }

  .doc-print .placa-row {
    border: 1px solid #999;
    border-top: none;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 700;
  }

  /* DATA-ROW */
  .data-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 0;
    border: 1px solid #999;
    border-top: none;
  }

  .data-cell {
    padding: 5px 8px;
    border-right: 1px solid #999;
    font-size: 11px;
  }

  .data-cell:last-child { border-right: none; }
  .data-cell .cell-label { font-weight: 700; color: var(--gray-500); font-size: 10px; text-transform: uppercase; margin-bottom: 2px; }

  /* ORDER COUNT BADGE */
  .nav-count {
    background: var(--red);
    color: #ffffff;
    border-radius: 10px;
    font-size: 10px;
    padding: 1px 6px;
    font-weight: 700;
    margin-left: 3px;
  }

  @media (max-width: 640px) {
    header { flex-wrap: wrap; height: auto; padding: .8rem 1rem; gap: 8px; }
    .form-grid { grid-template-columns: 1fr; }
    .order-grid { grid-template-columns: 1fr; }
    nav { overflow-x: auto; padding: 0 .5rem; }
    nav button { padding: 10px 14px; font-size: 12px; white-space: nowrap; }
    main { padding: 1rem; }
    .doc-print .header-block { grid-template-columns: 1fr; }
    .doc-print .bottom-row { grid-template-columns: 1fr; }
    .data-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<script>
// ── FIREBASE CONFIG ────────────────────────────────────
// 👇 SUBSTITUA PELOS SEUS DADOS DO FIREBASE (veja instruções abaixo)
const firebaseConfig = {
  apiKey: "AIzaSyCmglNWyxpKDOBDs7dPlfwqIM_JKT4IlJc",
  authDomain: "expresso-jl.firebaseapp.com",
  databaseURL: "https://expresso-jl-default-rtdb.firebaseio.com",
  projectId: "expresso-jl",
  storageBucket: "expresso-jl.firebasestorage.app",
  messagingSenderId: "542032636014",
  appId: "1:542032636014:web:722d41d3546c4b4e6fde7f"
};

try {
  firebase.initializeApp(firebaseConfig);
} catch(e) {}
const db = firebase.database();
const ordersRef = db.ref('ordens');
const metaRef   = db.ref('meta/nextId');

// ── STATE ──────────────────────────────────────────────
let orders = [];
let nextId = 1;
let firebaseReady = false;

// ── SINCRONIZAÇÃO EM TEMPO REAL ────────────────────────
ordersRef.on('value', snap => {
  const data = snap.val();
  orders = data ? Object.values(data) : [];
  orders.sort((a, b) => a.id - b.id);
  firebaseReady = true;
  updateNavCount();
  // Re-renderiza a página ativa
  const active = document.querySelector('.page.active');
  if (active) {
    if (active.id === 'page-painel') renderDash();
    if (active.id === 'page-ordens') renderOrders();
    if (active.id === 'page-emitir') populateDocSel();
  }
});

metaRef.on('value', snap => {
  const val = snap.val();
  if (val && val > nextId) nextId = val;
});

// Indicador de conexão
db.ref('.info/connected').on('value', snap => {
  const el = document.getElementById('conn-status');
  if (!el) return;
  if (snap.val()) {
    el.textContent = '🟢 Online';
    el.style.color = '#4ade80';
  } else {
    el.textContent = '🔴 Offline';
    el.style.color = '#f87171';
  }
});

function persist() {
  // não usado mais — Firebase cuida da persistência
  updateNavCount();
}

function updateNavCount() {
  const cnt = orders.filter(o => o.status === 'pendente' || o.status === 'em-rota').length;
  document.getElementById('nav-count').textContent = cnt;
}

// ── NAVIGATION ─────────────────────────────────────────
function goPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'painel') renderDash();
  if (id === 'ordens') renderOrders();
  if (id === 'emitir') populateDocSel();
}

// ── HELPERS ────────────────────────────────────────────
function pad(n) { return String(n).padStart(4, '0'); }
function fmtDate(d) {
  if (!d) return '—';
  const [y,m,dy] = d.split('-');
  return `${dy}/${m}/${y}`;
}

const STATUS_LABEL = { pendente:'Pendente', 'em-rota':'Em rota', coletado:'Coletado', cancelado:'Cancelado' };
const STATUS_ICON  = { pendente:'⏳', 'em-rota':'🚛', coletado:'✅', cancelado:'❌' };

function badge(status) {
  return `<span class="badge ${status}">${STATUS_ICON[status]||''} ${STATUS_LABEL[status]||status}</span>`;
}

// ── DASHBOARD ──────────────────────────────────────────
function renderDash() {
  const total = orders.length;
  const pend  = orders.filter(o=>o.status==='pendente').length;
  const rota  = orders.filter(o=>o.status==='em-rota').length;
  const col   = orders.filter(o=>o.status==='coletado').length;

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="m-label">📋 Total</div><div class="m-value">${total}</div></div>
    <div class="metric pendente"><div class="m-label">⏳ Pendentes</div><div class="m-value">${pend}</div></div>
    <div class="metric em-rota"><div class="m-label">🚛 Em rota</div><div class="m-value">${rota}</div></div>
    <div class="metric coletado"><div class="m-label">✅ Coletados</div><div class="m-value">${col}</div></div>
  `;

  const recentes = [...orders].reverse().slice(0, 5);
  const el = document.getElementById('dash-list');
  if (!firebaseReady) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div><p>Conectando ao banco de dados...</p></div>';
    return;
  }
  if (!recentes.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>Nenhuma ordem ainda. Clique em <strong>+ Nova Ordem</strong> para começar.</p></div>';
    return;
  }
  el.innerHTML = recentes.map(o => orderCardHtml(o, true)).join('');
}

// ── ORDER CARD ─────────────────────────────────────────
function orderCardHtml(o, brief) {
  return `<div class="order-card">
    <div class="order-top">
      <div>
        <span class="order-num">OC-${pad(o.id)}</span>
        <span class="order-date">${fmtDate(o.data)}</span>
      </div>
      ${badge(o.status)}
    </div>
    <div class="order-empresa">${o.empresa}</div>
    <div class="order-grid">
      <span>📍 <b>${o.endereco||'—'}</b></span>
      <span>📦 <b>${o.material||'—'} ${o.qtd?'· '+o.qtd:''}</b></span>
      <span>🚛 <b>${o.veiculo||'—'}</b></span>
      <span>👤 <b>${o.motorista||'—'}</b></span>
      ${o.destEmpresa ? `<span>🎯 <b>${o.destEmpresa}</b></span>` : ''}
      ${o.pedido ? `<span>🗒 <b>${o.pedido}</b></span>` : ''}
    </div>
    ${!brief ? `<div class="order-foot">
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:12px;color:var(--gray-500)">Status:</label>
        <select class="status-sel" onchange="updateStatus(${o.id},this.value)">
          <option value="pendente" ${o.status==='pendente'?'selected':''}>⏳ Pendente</option>
          <option value="em-rota" ${o.status==='em-rota'?'selected':''}>🚛 Em rota</option>
          <option value="coletado" ${o.status==='coletado'?'selected':''}>✅ Coletado</option>
          <option value="cancelado" ${o.status==='cancelado'?'selected':''}>❌ Cancelado</option>
        </select>
      </div>
      <button class="btn sm" onclick="openDocModal(${o.id})">⎙ Ver documento</button>
    </div>` : ''}
  </div>`;
}

// ── ORDERS LIST ────────────────────────────────────────
function renderOrders() {
  const search = (document.getElementById('search')||{}).value?.toLowerCase()||'';
  const fst    = (document.getElementById('fstatus')||{}).value||'';
  let list = [...orders].reverse();
  if (search) list = list.filter(o =>
    (o.empresa||'').toLowerCase().includes(search) ||
    (o.motorista||'').toLowerCase().includes(search) ||
    (o.destEmpresa||'').toLowerCase().includes(search)
  );
  if (fst) list = list.filter(o => o.status === fst);
  const el = document.getElementById('orders-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Nenhuma ordem encontrada.</p></div>';
    return;
  }
  el.innerHTML = list.map(o => orderCardHtml(o, false)).join('');
}

function updateStatus(id, status) {
  ordersRef.child(String(id)).update({ status });
}

// ── SAVE ORDER ─────────────────────────────────────────
function g(id) { return (document.getElementById(id)||{}).value?.trim()||''; }

function saveOrder() {
  const err = document.getElementById('form-err');
  const empresa = g('f-empresa'), endereco = g('f-endereco'), material = g('f-material');
  const veiculo = g('f-veiculo'), motorista = g('f-motorista'), data = g('f-data');
  const destEmpresa = g('f-dest-empresa'), destEndereco = g('f-dest-endereco');

  if (!empresa || !endereco || !material || !veiculo || !motorista || !data || !destEmpresa || !destEndereco) {
    err.textContent = 'Preencha todos os campos obrigatórios (*).';
    err.style.display = 'block';
    err.scrollIntoView({behavior:'smooth', block:'nearest'});
    return;
  }
  err.style.display = 'none';

  const order = {
    id: 0,
    empresa, cnpj: g('f-cnpj'), endereco, cidade: g('f-cidade'), ie: g('f-ie'),
    destEmpresa, destCnpj: g('f-dest-cnpj'), destEndereco, destCidade: g('f-dest-cidade'), destIe: g('f-dest-ie'),
    material, qtd: g('f-qtd'), peso: g('f-peso'), valor: g('f-valor'),
    pedido: g('f-pedido'), obs: g('f-obs'),
    veiculo, motorista, cpfMotorista: g('f-cpf'), data, serie: g('f-serie')||'1',
    status: 'pendente',
    criado: new Date().toISOString()
  };

  const newId = nextId++;
  order.id = newId;
  metaRef.set(nextId);
  ordersRef.child(String(newId)).set(order);
  clearForm();
  goPage('painel', document.querySelector('nav button:first-child'));
}

function clearForm() {
  ['f-empresa','f-cnpj','f-endereco','f-cidade','f-ie',
   'f-dest-empresa','f-dest-cnpj','f-dest-endereco','f-dest-cidade','f-dest-ie',
   'f-material','f-qtd','f-peso','f-valor','f-pedido','f-obs',
   'f-veiculo','f-motorista','f-cpf','f-data'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  const serie = document.getElementById('f-serie');
  if (serie) serie.value = '1';
  const err = document.getElementById('form-err');
  if (err) err.style.display = 'none';
}

// ── DOCUMENTO ──────────────────────────────────────────
function populateDocSel() {
  const sel = document.getElementById('doc-sel');
  sel.innerHTML = '<option value="">— Selecione uma ordem —</option>';
  [...orders].reverse().forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.id;
    opt.textContent = `OC-${pad(o.id)} · ${o.empresa} · ${fmtDate(o.data)}`;
    sel.appendChild(opt);
  });
}

function loadDoc() {
  const id = parseInt(document.getElementById('doc-sel').value);
  if (!id) { document.getElementById('doc-area').innerHTML = '<div class="empty"><p>Selecione uma ordem para visualizar o documento.</p></div>'; return; }
  const o = orders.find(x => x.id === id);
  if (!o) return;
  document.getElementById('doc-area').innerHTML = buildDoc(o);
}

function openDocModal(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  document.getElementById('modal-title').textContent = `Documento — OC-${pad(o.id)}`;
  document.getElementById('modal-body').innerHTML = buildDoc(o);
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

        <div class="cell-val">${o.motorista||'—'}</div>
        ${o.cpfMotorista ? `<div style="font-size:11px;color:#666;margin-top:2px">CPF: ${o.cpfMotorista}</div>` : ''}
      </div>
      <div class="bottom-cell">
        <div class="cell-label">Destino</div>
        <div class="cell-val">${o.destEmpresa||'—'}</div>
      </div>
      <div class="bottom-cell">
        <div class="cell-label">Pedido / Ordem de Compra</div>
        <div class="cell-val pedidos">${o.pedido||'—'}</div>
      </div>
    </div>

    <div class="obs-row">
      <div class="cell-label">Observações</div>
      <div style="font-size:12px;min-height:28px">${o.obs||''}</div>
    </div>

    <div class="placa-row">
      PLACA DO VEÍCULO: <span style="color:var(--red)">${o.veiculo||'—'}</span>
    </div>
  </div>`;
}

function printDoc() {
  const content = document.getElementById('doc-print-content');
  if (!content) { alert('Carregue um documento primeiro.'); return; }
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>OC — Expresso JL</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    ${document.querySelector('style').textContent}
  </style></head><body>${content.outerHTML}</body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 500);
}
